<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {

    :root {

      --accent: #2563eb; --input-bg: #ffffff; --hover: #e8e8f4;
      --search-border: #b0b0cc;
    }
  }

  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; height: 100vh; overflow: hidden; }
  #graph { flex: 1; min-height: 0; touch-action: none; }
  #sidebar { width: 280px; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: width 0.2s ease; }
  #sidebar.collapsed { width: 0; border-left: none; }
  #sidebar-toggle { position: fixed; right: 0; top: 50%; transform: translateY(-50%); z-index: 100; background: var(--bg2); border: 1px solid var(--border); border-right: none; color: var(--muted); font-size: 16px; width: 20px; height: 44px; cursor: pointer; border-radius: 6px 0 0 6px; display: flex; align-items: center; justify-content: center; transition: right 0.2s ease; user-select: none; }
  #sidebar.collapsed ~ #sidebar-toggle, body > #sidebar-toggle { right: 0; }
  #sidebar:not(.collapsed) ~ #sidebar-toggle { right: 280px; }
  #search-wrap { padding: 12px; border-bottom: 1px solid var(--border); }
  #search { width: 100%; background: var(--input-bg); border: 1px solid var(--search-border); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 13px; outline: none; }
  #search:focus { border-color: var(--accent); }
  #search-results { max-height: 140px; overflow-y: auto; padding: 4px 12px; border-bottom: 1px solid var(--border); display: none; }
  .search-item { padding: 4px 6px; cursor: pointer; border-radius: 4px; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .search-item:hover { background: var(--hover); }
  #info-panel { padding: 14px; border-bottom: 1px solid var(--border); min-height: 140px; }
  #info-panel h3 { font-size: 13px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  #info-content { font-size: 13px; color: var(--text2); line-height: 1.6; }
  #info-content .field { margin-bottom: 5px; }
  #info-content .field b { color: var(--text); }
  #info-content .empty { color: var(--dim); font-style: italic; }
  .neighbor-link { display: block; padding: 2px 6px; margin: 2px 0; border-radius: 3px; cursor: pointer; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 3px solid var(--border); color: var(--text2); }
  .neighbor-link:hover { background: var(--hover); }
  #info-content .open-actions { margin: 6px 0 4px; font-size: 12px; }
  #info-content .open-label { display: block; font-size: 10px; color: var(--dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  #info-content .open-link { color: var(--accent); text-decoration: underline; cursor: pointer; }
  #info-content .open-sep { color: var(--dim); margin: 0 2px; }
  #info-content .copy-path-btn {
    background: var(--hover); border: 1px solid var(--border); color: var(--text2);
    font-size: 11px; padding: 2px 8px; border-radius: 4px; cursor: pointer;
  }
  #info-content .copy-path-btn:hover { color: var(--text); border-color: var(--accent); }
  #info-content .source-path { font-size: 11px; word-break: break-all; }
  #info-content .source-path code { color: var(--muted); font-size: 11px; }
  #info-content .file-hint { font-size: 11px; color: var(--dim); margin: 6px 0 0; line-height: 1.4; }
  #info-content .file-hint code { font-size: 10px; color: var(--muted); }
  #info-content .github-row { margin-bottom: 6px; }
  #neighbors-list { max-height: 160px; overflow-y: auto; margin-top: 4px; }
  #legend-wrap { flex: 1; overflow-y: auto; padding: 12px; }
  #legend-wrap h3 { font-size: 13px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .legend-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer; border-radius: 4px; font-size: 12px; }
  .legend-item:hover { background: var(--hover); padding-left: 4px; }
  .legend-item.dimmed { opacity: 0.35; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text2); }
  .legend-count { color: var(--dim); font-size: 11px; }
  #stats { padding: 10px 14px; border-top: 1px solid var(--border); font-size: 11px; color: var(--dim); }
</style>

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const SPELLBOOK_FILES_ROOT = "/Users/coocoocachoo/";
function absSourcePath(rel) {
  if (!rel || rel === '-') return '';
  const s = String(rel);
  if (s.startsWith('/')) return s;
  return SPELLBOOK_FILES_ROOT + s.replace(/^\/+/,'');
}
function fileUrlForPath(abs) {
  if (!abs) return '#';
  const normalized = abs.replace(/\\/g, '/');
  return 'file://' + encodeURI(normalized);
}
function githubUrlFromSpellbookSource(rel) {
  if (!rel) return '';
  const m = String(rel).match(/spellbook-homework\/([^/]+)\.md$/i);
  if (!m) return '';
  const stem = m[1];
  const sep = '__';
  const i = stem.indexOf(sep);
  if (i <= 0) return '';
  return 'https://github.com/' + stem.slice(0, i) + '/' + stem.slice(i + sep.length);
}
function githubUrlFromInstalledGraphify(rel) {
  const s = String(rel || '');
  if (s.includes('site-packages/graphify')) return 'https://github.com/raufer/graphify';
  if (s.includes('/graphify/graphify/')) return 'https://github.com/raufer/graphify';
  return '';
}
function resolveGithubRepoUrl(n) {
  const su = n._source_url;
  if (su && /^https?:\/\//i.test(String(su))) return String(su).trim();
  const src = n._source_file || '';
  const fromHomework = githubUrlFromSpellbookSource(src);
  if (fromHomework) return fromHomework;
  return githubUrlFromInstalledGraphify(src);
}
function showInfo(nodeId) {
  const n = nodesDS.get(nodeId);
  if (!n) return;
  const neighborIds = network.getConnectedNodes(nodeId);
  const neighborItems = neighborIds.map(nid => {
    const nb = nodesDS.get(nid);
    const color = nb ? nb.color.background : '#555';
    return `<span class="neighbor-link" style="border-left-color:${esc(color)}" onclick="focusNode(${JSON.stringify(nid)})">${esc(nb ? nb.label : nid)}</span>`;
  }).join('');
  const src = n._source_file;
  const absFile = absSourcePath(src);
  const dirPath = absFile ? absFile.replace(/\/[^/]+$/, '') : '';
  const ghUrl = resolveGithubRepoUrl(n);
  const githubRow = ghUrl

  document.getElementById('info-content').innerHTML = `

      const p = btn.getAttribute('data-path');
      if (p && navigator.clipboard) navigator.clipboard.writeText(p).catch(() => {});
    });
  }
}

function drawHyperedges() {
    const canvas = network.canvas.frame.canvas;
    const ctx = canvas.getContext('2d');
    hyperedges.forEach(h => {
        const positions = h.nodes
            .map(nid => network.getPositions([nid])[nid])
            .filter(p => p !== undefined);
        if (positions.length < 2) return;
        // Draw convex hull as filled polygon
        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = '#6366f1';
        ctx.strokeStyle = '#6366f1';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const scale = network.getScale();
        const offset = network.getViewPosition();
        const toCanvas = (p) => ({
            x: (p.x - offset.x) * scale + canvas.width / 2,
            y: (p.y - offset.y) * scale + canvas.height / 2
        });
        const pts = positions.map(toCanvas);
        // Expand hull slightly
        const cx = pts.reduce((s, p) => s + p.x, 0) / pts.length;
        const cy = pts.reduce((s, p) => s + p.y, 0) / pts.length;
        const expanded = pts.map(p => ({
            x: cx + (p.x - cx) * 1.15,
            y: cy + (p.y - cy) * 1.15
        }));
        ctx.moveTo(expanded[0].x, expanded[0].y);
        expanded.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 0.4;
        ctx.stroke();
        // Label
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = '#4f46e5';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(h.label, cx, cy - 5);
        ctx.restore();
    });
}
network.on('afterDrawing', drawHyperedges);
