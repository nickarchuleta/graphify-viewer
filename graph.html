    ${githubRow}
    <div class="field">Type: ${esc(n._file_type || 'unknown')}</div>
    <div class="field">Community: ${esc((n._community_name && String(n._community_name).trim()) || legendLabelForCid(n._community) || '—')}</div>
    ${openRow}
    <div class="field">Degree: ${n._degree}</div>
    ${neighborIds.length ? `<div class="field" style="margin-top:8px;color:var(--muted);font-size:11px">Neighbors (${neighborIds.length})</div><div id="neighbors-list">${neighborItems}</div>` : ''}
  `;
  const btn = document.querySelector('#info-content .copy-path-btn');

      ev.preventDefault();

}
(function spellbookBindLocalOpenOnce() {
  const panel = document.getElementById('info-content');
  if (!panel || panel.dataset.spellbookOpenBound) return;
  panel.dataset.spellbookOpenBound = '1';
  panel.addEventListener('click', (ev) => {
    const tgt = (ev.target && ev.target.nodeType === 1) ? ev.target : ev.target && ev.target.parentElement;
    const n = tgt && tgt.closest ? tgt.closest('[data-neighbor-id]') : null;
    if (n) {
      ev.preventDefault();
      ev.stopPropagation();
      const rawNid = n.getAttribute('data-neighbor-id');
      if (!rawNid) return;
      let nid = rawNid;
      try { nid = decodeURIComponent(rawNid); } catch (e) {}
      spellbookSetNeighborHot(nid);
      if (!nodesDS.get(nid)) return;
      focusNode(nid);
      return;
    }
    const f = tgt && tgt.closest ? tgt.closest('[data-spellbook-open-file]') : null;
    const d = tgt && tgt.closest ? tgt.closest('[data-spellbook-open-dir]') : null;
    if (!f && !d) return;
    ev.preventDefault();
    ev.stopPropagation();
    const raw = f ? f.getAttribute('data-spellbook-open-file') : d.getAttribute('data-spellbook-open-dir');
    if (!raw) return;
    let dec;
    try { dec = decodeURIComponent(raw); } catch (e) { return; }
    if (!dec) return;
    try {
      window.open(fileUrlForPath(dec), '_blank', 'noopener,noreferrer');
    } catch (e) {}
  });
})();
window.addEventListener('message', (ev) => {
  const d = ev.data;
  if (!d || typeof d !== 'object') return;
  if (d.type === 'link-mode-set') {
    const lm = document.getElementById('spell-link-mode');
    if (lm) {
      lm.checked = !!d.enabled;
      lm.dispatchEvent(new Event('change'));
    }
    if (window.parent !== window) {
      try { window.parent.postMessage({ type: 'dock-link-status', text: (lm && lm.checked) ? 'Pick first…' : 'Off' }, '*'); } catch (e) {}
    }
    return;
  }
  if (d.type === 'link-mode-cancel') {
    const btn = document.getElementById('spell-link-cancel');
    if (btn) btn.click();
    return;
  }
  if (d.type === 'link-mode-clear') {
    const btn = document.getElementById('spell-link-clear');
    if (btn) btn.click();
    return;
  }
  if (d.type === 'spell-community-focus' && Number.isFinite(Number(d.cid)) && typeof hiddenCommunities !== 'undefined') {
    const cid = Number(d.cid);
    hiddenCommunities.clear();
    LEGEND.forEach((c) => { if (c.cid !== cid) hiddenCommunities.add(c.cid); });
    if (typeof spellbookRecomputeVisibility === 'function') spellbookRecomputeVisibility();
    return;
  }
  if (d.type === 'request-groups' && window.parent !== window) {
    try {
      window.parent.postMessage({
        type: 'dock-groups-data',
        kind: 'spell',
        items: LEGEND.map((x) => ({ cid: x.cid, label: x.label, color: x.color, count: x.count }))
      }, '*');
    } catch (e) {}
  }
});
if (window.parent !== window) {
  try {
    window.parent.postMessage({
      type: 'spellbook-stats',
      nodes: Array.isArray(RAW_NODES) ? RAW_NODES.length : 0,
      edges: Array.isArray(RAW_EDGES) ? RAW_EDGES.length : 0,
      builtAt: SPELLBOOK_BUILD_TS
    }, '*');
  } catch (e) {}
}

function focusNode(nodeId) {
  network.focus(nodeId, { scale: 1.2, animation: false });
  network.selectNodes([nodeId]);
  showInfo(nodeId);
}

// Track hovered node — hover detection is more reliable than click params
let hoveredNodeId = null;
network.on('hoverNode', params => {
  hoveredNodeId = params.node;
  container.style.cursor = 'pointer';
});
network.on('blurNode', () => {
  hoveredNodeId = null;
  container.style.cursor = 'default';
});
container.addEventListener('click', () => {
  if (hoveredNodeId !== null) {
    showInfo(hoveredNodeId);
    network.selectNodes([hoveredNodeId]);
  }
});
network.on('click', params => {
  if (params.nodes.length > 0) {
    showInfo(params.nodes[0]);

const searchInput = document.getElementById('search');

document.addEventListener('click', e => {
  if (!searchResults.contains(e.target) && e.target !== searchInput)
    searchResults.style.display = 'none';
});

const hiddenCommunities = new Set();
const SPELLBOOK_LENS_KEY = 'spellbookKeywordLens_v1';
const SPELL_FOCUS_PRESETS = [
  { id: 'mac', label: 'This Mac & Apple', color: '#4E79A7', kws: ['swift', 'mlx', 'macos', 'darwin', 'xcode', 'ios', 'appkit', 'catalyst', 'apple-silicon', 'metal', 'swiftui', 'cocoa', 'foundation', 'objc', 'watchos', 'tvos'] },
  { id: 'ai_code', label: 'AI coding stack', color: '#F28E2B', kws: ['claude', 'mcp', 'cursor', 'copilot', 'codex', 'openclaw', 'aider', 'windsurf', 'opencode', 'gemini-cli', 'cline', 'continue.dev'] },
  { id: 'agents', label: 'Agents & orchestration', color: '#EDC948', kws: ['agent', 'multi-agent', 'autogen', 'crewai', 'langgraph', 'orchestr', 'swarm', 'droid'] },
  { id: 'local_ai', label: 'Local / edge inference', color: '#E15759', kws: ['ollama', 'llama.cpp', 'gguf', 'vllm', 'onnx', 'tensorrt', 'quantization', 'mlx', 'inference', 'ggml'] },
  { id: 'graphs', label: 'Graphs & RAG', color: '#59A14F', kws: ['graph', 'rag', 'vector', 'embedding', 'neo4j', 'chromadb', 'graphrag', 'lancedb'] },
  { id: 'browser', label: 'Browser automation', color: '#76B7B2', kws: ['playwright', 'puppeteer', 'browser-use', 'selenium', 'cdp', 'headless'] },
  { id: 'data', label: 'Data & ML', color: '#FF9DA7', kws: ['dataset', 'pandas', 'spark', 'pytorch', 'jupyter', 'notebook', 'huggingface', 'keras'] },
  { id: 'sec', label: 'Security & OSINT', color: '#9C755F', kws: ['security', 'osint', 'pentest', 'cve', 'malware', 'forensic'] },
  { id: 'misc', label: 'Everything else', color: '#BAB0AC', kws: [] },
];
window.__spellbookLens = null;
function spellbookLoadLens() {
  try {
    const raw = localStorage.getItem(SPELLBOOK_LENS_KEY);
    if (!raw) return null;
    const j = JSON.parse(raw);
    return Array.isArray(j) && j.length ? j : null;
  } catch (e) { return null; }
}
function spellbookSaveLens(arr) {
  try {
    if (!arr || !arr.length) localStorage.removeItem(SPELLBOOK_LENS_KEY);
    else localStorage.setItem(SPELLBOOK_LENS_KEY, JSON.stringify(arr));
  } catch (e) {}
}
function spellbookNotifyStarsKeywords(parts) {
  if (window.parent !== window) {
    try {
      window.parent.postMessage({ type: 'unified-spellbook-keywords', keywords: parts || [] }, '*');
    } catch (e) {}
  }
}
function spellbookRecomputeVisibility() {
  const lens = window.__spellbookLens;
  const updates = RAW_NODES.map(function (n) {
    const commHidden = hiddenCommunities.has(n.community);
    let kwHit = true;
    if (lens && lens.length) {
      const blob = (
        String(n.label || '') + ' ' + String(n.title || '') + ' ' +
        String(n.community_name || '') + ' ' + String((n._community_name != null ? n._community_name : '') || '') + ' ' +
        String(n._source_file || '') + ' ' + String(n._source_url || '')
      ).toLowerCase();
      kwHit = lens.some(function (kw) { return blob.indexOf(String(kw).toLowerCase()) !== -1; });
    }
    return { id: n.id, hidden: commHidden || !kwHit };
  });
  nodesDS.update(updates);
}
function spellbookLegendDisambigStrip(s) {
  const parts = String(s || '').split(' · ').map(function (p) { return p.trim(); });
  if (parts.length >= 3 && /^\d+$/.test(parts[parts.length - 1])) {
    parts.pop();
    parts.pop();
    return parts.join(' · ');
  }
  return String(s || '').trim();
}
function spellbookRollupLegend(entries) {
  const m = new Map();
  for (let i = 0; i < entries.length; i++) {
    const c = entries[i];
    const base = spellbookLegendDisambigStrip(c.label);
    const k = base.toLowerCase();
    if (!m.has(k)) {
      m.set(k, { label: base, color: c.color, count: 0, cids: [] });
    }
    const g = m.get(k);
    g.count += (c.count | 0) || 0;
    g.cids.push(c.cid);
  }
  return Array.from(m.values()).sort(function (a, b) { return b.count - a.count; });
}
const legendEl = document.getElementById('legend');
const LEGEND_ROLLUP = spellbookRollupLegend(LEGEND);
LEGEND_ROLLUP.forEach(function (g) {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.cids = g.cids.join(',');
  const displayLabel = g.cids.length > 1 ? (g.label + ' · ' + g.cids.length + '×') : g.label;
  item.innerHTML = '<div class="legend-dot" style="background:' + g.color + '"></div>' +
    '<span class="legend-label">' + displayLabel + '</span>' +
    '<span class="legend-count">' + g.count + '</span>';
  item.onclick = function () {
    const allHidden = g.cids.every(function (cid) { return hiddenCommunities.has(cid); });
    g.cids.forEach(function (cid) {
      if (allHidden) hiddenCommunities.delete(cid);
      else hiddenCommunities.add(cid);
    });
    item.classList.toggle('dimmed', g.cids.every(function (cid) { return hiddenCommunities.has(cid); }));
    spellbookRecomputeVisibility();
  };
  const initDim = g.cids.every(function (cid) { return hiddenCommunities.has(cid); });
  if (initDim) item.classList.add('dimmed');
  legendEl.appendChild(item);
});
(function spellFocusPresetsInit() {
  const host = document.getElementById('spell-focus-presets');
  const clr = document.getElementById('spell-focus-clear');
  if (!host) return;
  const countMatches = function (preset) {
    if (!preset.kws || !preset.kws.length) {
      return RAW_NODES.filter(function (n) {
        const blob = (
          String(n.label || '') + ' ' + String(n.title || '') + ' ' +
          String(n.community_name || '') + ' ' + String((n._community_name != null ? n._community_name : '') || '') + ' ' +
          String(n._source_file || '') + ' ' + String(n._source_url || '')
        ).toLowerCase();
        return !SPELL_FOCUS_PRESETS.slice(0, -1).some(function (p) {
          return p.kws.some(function (kw) { return blob.indexOf(String(kw).toLowerCase()) !== -1; });
        });
      }).length;
    }
    return RAW_NODES.filter(function (n) {
      const blob = (
        String(n.label || '') + ' ' + String(n.title || '') + ' ' +
        String(n.community_name || '') + ' ' + String((n._community_name != null ? n._community_name : '') || '') + ' ' +
        String(n._source_file || '') + ' ' + String(n._source_url || '')
      ).toLowerCase();
      return preset.kws.some(function (kw) { return blob.indexOf(String(kw).toLowerCase()) !== -1; });
    }).length;
  };
  const renderRows = function () {
    host.innerHTML = '';
    SPELL_FOCUS_PRESETS.forEach(function (p) {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'spell-group-btn';
      const active = window.__spellbookLens && Array.isArray(window.__spellbookLens) &&
        window.__spellbookLens.length === p.kws.length &&
        p.kws.every(function (kw) { return window.__spellbookLens.indexOf(kw) !== -1; });
      if (active) b.classList.add('active');
      b.innerHTML =
        '<span class="spell-group-dot" style="background:' + p.color + '"></span>' +
        '<span class="spell-group-name">' + p.label + '</span>' +
        '<span class="spell-group-count">' + countMatches(p) + '</span>';
      b.addEventListener('click', function () {
        if (active) {
          window.__spellbookLens = null;
          spellbookSaveLens(null);
          spellbookRecomputeVisibility();
          spellbookNotifyStarsKeywords([]);
        } else {
          window.__spellbookLens = p.kws.slice();
          spellbookSaveLens(window.__spellbookLens);
          spellbookRecomputeVisibility();
          spellbookNotifyStarsKeywords(p.kws);
        }
        renderRows();
      });
      host.appendChild(b);
    });
  };
  if (clr) {
    clr.addEventListener('click', function () {
      window.__spellbookLens = null;
      spellbookSaveLens(null);
      spellbookRecomputeVisibility();
      spellbookNotifyStarsKeywords([]);
      renderRows();
    });
  }
  const saved = spellbookLoadLens();
  if (saved) {
    window.__spellbookLens = saved;
    spellbookRecomputeVisibility();
    spellbookNotifyStarsKeywords(saved);
  }
  renderRows();
})();

<script>
// Render hyperedges as shaded regions
const hyperedges = [];
function drawHyperedges() {
    const canvas = network.canvas.frame.canvas;
    const ctx = canvas.getContext('2d');
    const seenHyperedgeIds = new Set();
    let hullsDrawn = 0;
    const MAX_HYPEREDGE_HULLS = 32;
    hyperedges.forEach(h => {
        if (!h || !h.id || seenHyperedgeIds.has(h.id)) return;
        seenHyperedgeIds.add(h.id);
        if (hullsDrawn >= MAX_HYPEREDGE_HULLS) return;
        hullsDrawn++;
        const positions = h.nodes
            .map(nid => network.getPositions([nid])[nid])
            .filter(p => p !== undefined);
        if (positions.length < 2) return;
        // Draw convex hull as filled polygon (SPELLBOOK_NEBULA_TASTEFUL)
        ctx.save();
        ctx.globalAlpha = 0.055;
        ctx.fillStyle = '#6d74f8';
        ctx.strokeStyle = '#7f86ff';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        const scale = network.getScale();
        const offset = network.getViewPosition();
        const toCanvas = (p) => ({
            x: (p.x - offset.x) * scale + canvas.width / 2,
            y: (p.y - offset.y) * scale + canvas.height / 2
        });
        const pts = positions.map(toCanvas);
        // Expand hull slightly
        const cx = pts.reduce((s, p) => s + p.x, 0) / pts.length;
        const cy = pts.reduce((s, p) => s + p.y, 0) / pts.length;
        const expanded = pts.map(p => ({
            x: cx + (p.x - cx) * 1.08,
            y: cy + (p.y - cy) * 1.08
        }));
        ctx.moveTo(expanded[0].x, expanded[0].y);
        expanded.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 0.18;
        ctx.stroke();
        // Label
        ctx.globalAlpha = 0.32;
        ctx.fillStyle = '#4f46e5';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(h.label, cx, cy - 5);
        ctx.restore();
    });
}
// Hyperedge hulls under the graph (afterDrawing would paint on top)
network.on('beforeDrawing', drawHyperedges);
</script>
